<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="حاسبة العملات">
<meta name="theme-color" content="#F7F8FA">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<title>حاسبة العملات — مولا سوريا</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans Arabic','DM Sans',system-ui,sans-serif; }
html, body { height:100%; background:#F7F8FA; color:#0F1C2E; direction:rtl; text-align:right; -webkit-tap-highlight-color:transparent; }
html.en, html.en body { direction:ltr; text-align:left; }
html.en * { font-family:'DM Sans',system-ui,sans-serif; }
body { display:flex; flex-direction:column; max-width:480px; margin:0 auto; padding:env(safe-area-inset-top) 0 0; overflow-x:hidden; }

/* Header */
.header { padding:16px 20px 8px; text-align:center; position:relative; }
.header .logo { display:inline-flex; align-items:center; margin-bottom:4px; direction:ltr; }
.header .logo-text { font-family:'DM Sans',system-ui,sans-serif !important; font-size:22px; font-weight:800; color:#0B1A2E; letter-spacing:-0.5px; line-height:1; }
.header .logo-dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:#00B856; margin-left:1px; vertical-align:super; }
.header h1 { font-size:20px; font-weight:800; color:#0B1A2E; letter-spacing:-.3px; margin:0; }

/* Language toggle */
.lang-wrap { display:inline-flex; background:#F0F2F5; border-radius:10px; padding:2px; position:absolute; top:16px; right:20px; direction:ltr; }
.lang-btn { padding:5px 10px; border-radius:6px; font-size:11px; font-weight:700; cursor:pointer; color:#94A3B8; border:none; background:transparent; font-family:'DM Sans',system-ui,sans-serif !important; transition:all .2s; white-space:nowrap; }
.lang-btn.active { color:#0B1A2E; background:#FFF; box-shadow:0 1px 2px rgba(0,0,0,.08); }

/* Currency toggle */
.toggle-wrap { display:flex; background:#E8EBF0; border-radius:12px; padding:3px; margin:0 20px 12px; }
.toggle-btn { flex:1; padding:12px; border-radius:10px; text-align:center; font-size:14px; font-weight:700; cursor:pointer; color:#5A6B7F; transition:all .2s; border:none; background:transparent; font-family:inherit; }
.toggle-btn.active { color:#0B1A2E; background:#FFF; box-shadow:0 1px 3px rgba(0,0,0,.1); }

/* Panels */
.panel { display:none; flex-direction:column; flex:1; overflow-y:auto; padding-bottom:80px; }
.panel.active { display:flex; }

/* Shared input style */
.amt-input { width:100%; border:none; outline:none; background:transparent; text-align:center; font-size:42px; font-weight:800; color:#0B1A2E; letter-spacing:-1px; direction:ltr; font-family:'DM Sans','Noto Sans Arabic',system-ui,sans-serif; }
.amt-input::placeholder { color:#94A3B8; }
.amt-input::-webkit-outer-spin-button,
.amt-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
.amt-input[type=number] { -moz-appearance:textfield; }

/* Calc mode display */
.amount-display { text-align:center; padding:12px 20px 4px; direction:ltr; }
.amount-display .currency { font-size:15px; font-weight:600; color:#94A3B8; }
.amount-display .equiv { font-size:13px; color:#94A3B8; margin:4px 0 0; direction:ltr; }

/* Change mode fields */
.change-fields { padding:0 20px 8px; }
.change-field-group { margin-bottom:8px; }
.field-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.field-header .field-label { font-size:14px; font-weight:700; color:#5A6B7F; }
.field-cur-toggle { display:flex; background:#F0F2F5; border-radius:10px; padding:2px; }
.field-cur-btn { padding:7px 14px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; color:#94A3B8; border:none; background:transparent; font-family:inherit; transition:all .2s; white-space:nowrap; }
.field-cur-btn.active { color:#0B1A2E; background:#FFF; box-shadow:0 1px 2px rgba(0,0,0,.08); }
.change-field { display:flex; align-items:center; padding:10px 14px; border-radius:12px; border:2px solid #E2E8F0; background:#FFF; transition:border-color .2s; }
.change-field:focus-within { border-color:#00B856; }
.change-field .field-input { flex:1; border:none; outline:none; background:transparent; text-align:left; direction:ltr; font-size:24px; font-weight:800; color:#0B1A2E; letter-spacing:-.5px; font-family:'DM Sans','Noto Sans Arabic',system-ui,sans-serif; }
.change-field .field-input::placeholder { color:#94A3B8; }
.change-field .field-input::-webkit-outer-spin-button,
.change-field .field-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
.change-field .field-input[type=number] { -moz-appearance:textfield; }

/* Arrow between fields */
.field-arrow { text-align:center; margin:4px 0; color:#94A3B8; }

/* Change result */
.change-result { margin:0 20px 12px; padding:14px 16px; border-radius:14px; background:#0B1A2E; text-align:center; direction:ltr; }
.change-result .change-label { font-size:12px; font-weight:600; color:rgba(255,255,255,.5); margin-bottom:4px; }
.change-result .change-amount { font-size:32px; font-weight:800; color:#FFF; letter-spacing:-.5px; }
.change-result .change-amount.negative { color:#E53E3E; }
.change-result .change-cur { font-size:14px; font-weight:600; color:rgba(255,255,255,.4); margin-right:4px; }
.change-result .change-equiv { font-size:12px; color:rgba(255,255,255,.35); margin-top:2px; }

/* Results */
.results { padding:0 20px 32px; }
.results-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.results-header .line { height:1px; flex:1; background:#E2E8F0; }
.results-header .label { font-size:11px; font-weight:700; color:#94A3B8; letter-spacing:1px; white-space:nowrap; }
.bill-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; margin-bottom:5px; }
.bill-badge { min-width:32px; height:24px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; }
.bill-info { flex:1; display:flex; align-items:baseline; gap:4px; }
.bill-info .denom { font-size:16px; font-weight:800; color:#0B1A2E; }
.bill-info .unit { font-size:11px; color:#94A3B8; }
.bill-count { font-size:15px; font-weight:700; color:#0B1A2E; }
.bill-total { font-size:11px; color:#94A3B8; text-align:center; margin:10px 0 0; }
.bill-warning { text-align:center; padding:12px; color:#F59E0B; font-size:13px; font-weight:600; }

/* Bottom tab bar */
.tabbar { position:fixed; bottom:0; left:0; right:0; background:#FFF; border-top:1px solid #E2E8F0; display:flex; justify-content:center; padding:0; z-index:100; }
.tabbar-inner { display:flex; width:100%; max-width:480px; }
.tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 0 calc(10px + env(safe-area-inset-bottom)); cursor:pointer; border:none; background:transparent; font-family:inherit; transition:all .2s; }
.tab .tab-icon { color:#94A3B8; transition:color .2s; }
.tab .tab-label { font-size:11px; font-weight:600; color:#94A3B8; transition:color .2s; }
.tab.active .tab-icon { color:#00B856; }
.tab.active .tab-label { font-weight:700; color:#00B856; }

/* Install banner */
.install-banner { position:fixed; bottom:70px; left:12px; right:12px; max-width:456px; margin:0 auto; background:#0B1A2E; color:#FFF; border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:12px; z-index:200; box-shadow:0 8px 30px rgba(0,0,0,.25); animation:slideUp .3s ease; }
@keyframes slideUp { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.install-banner .ib-icon { width:36px; height:36px; border-radius:10px; background:rgba(0,184,86,.15); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#00B856; }
.install-banner .ib-text { flex:1; font-size:13px; line-height:1.5; }
.install-banner .ib-text strong { font-weight:700; }
.install-banner .ib-share { display:inline; vertical-align:middle; }
.install-banner .ib-close { width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,.1); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; border:none; color:#FFF; font-size:14px; font-family:inherit; }
.install-banner .ib-install { padding:8px 16px; border-radius:10px; background:#00B856; color:#FFF; border:none; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; flex-shrink:0; }
</style>
</head>
<body>

<div class="header">
  <div class="lang-wrap">
    <button class="lang-btn active" id="lang-ar" onclick="setLang('ar')">عربي</button>
    <button class="lang-btn" id="lang-en" onclick="setLang('en')">English</button>
  </div>
  <div class="logo">
    <span class="logo-text">moola</span><span class="logo-dot"></span>
  </div>
  <h1 id="page-title">حاسبة الباقي</h1>
</div>

<!-- ═══ CHANGE MODE (default) ═══ -->
<div class="panel active" id="panel-change">
  <div class="change-fields">
    <div class="change-field-group">
      <div class="field-header">
        <span class="field-label" data-t="owed">المبلغ المطلوب</span>
        <div class="field-cur-toggle">
          <button class="field-cur-btn active" id="owed-cur-new" onclick="setFieldCur('owed','new')" data-t="new">جديدة</button>
          <button class="field-cur-btn" id="owed-cur-old" onclick="setFieldCur('owed','old')" data-t="old">قديمة</button>
        </div>
      </div>
      <div class="change-field">
        <input type="number" inputmode="numeric" pattern="[0-9]*" class="field-input" id="ch-owed-input" placeholder="0" oninput="updateChange()">
      </div>
    </div>
    <div class="field-arrow">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
    </div>
    <div class="change-field-group">
      <div class="field-header">
        <span class="field-label" data-t="paid">المبلغ المدفوع</span>
        <div class="field-cur-toggle">
          <button class="field-cur-btn active" id="paid-cur-new" onclick="setFieldCur('paid','new')" data-t="new">جديدة</button>
          <button class="field-cur-btn" id="paid-cur-old" onclick="setFieldCur('paid','old')" data-t="old">قديمة</button>
        </div>
      </div>
      <div class="change-field">
        <input type="number" inputmode="numeric" pattern="[0-9]*" class="field-input" id="ch-paid-input" placeholder="0" oninput="updateChange()">
      </div>
    </div>
  </div>

  <div class="change-result" id="ch-result" style="display:none">
    <div class="change-label" data-t="changeLabel">الباقي</div>
    <div style="display:flex;align-items:baseline;justify-content:center;gap:4px">
      <span class="change-amount" id="ch-change-amt">0</span>
      <span class="change-cur" id="ch-change-cur">جديدة</span>
    </div>
    <p class="change-equiv" id="ch-change-equiv"></p>
  </div>

  <div class="results" id="ch-results" style="display:none">
    <div class="results-header">
      <div class="line"></div>
      <span class="label" data-t="changeBills">تفاصيل أوراق الباقي</span>
      <div class="line"></div>
    </div>
    <div id="ch-bills"></div>
    <p class="bill-total" id="ch-total"></p>
  </div>
</div>

<!-- ═══ CALC MODE ═══ -->
<div class="panel" id="panel-calc">
  <div class="toggle-wrap">
    <button class="toggle-btn active" id="tog-new" onclick="setCur('new')" data-t="new">جديدة</button>
    <button class="toggle-btn" id="tog-old" onclick="setCur('old')" data-t="old">قديمة</button>
  </div>

  <div class="change-fields">
    <div class="change-field-group">
      <div class="field-header">
        <span class="field-label" data-t="calcAmount">المبلغ</span>
      </div>
      <div class="change-field">
        <input type="number" inputmode="numeric" pattern="[0-9]*" class="field-input" id="calc-input" placeholder="0" oninput="updateCalc()">
      </div>
    </div>
  </div>
  <div style="text-align:center;padding:0 20px 8px">
    <p class="equiv" id="calc-equiv" style="font-size:14px;color:#94A3B8;direction:ltr">= 0 قديمة</p>
  </div>

  <div class="results" id="calc-results" style="display:none">
    <div class="results-header">
      <div class="line"></div>
      <span class="label" data-t="calcBills">تفاصيل الأوراق النقدية</span>
      <div class="line"></div>
    </div>
    <div id="calc-bills"></div>
    <p class="bill-total" id="calc-total"></p>
  </div>
</div>

<!-- Bottom tab bar -->
<div class="tabbar">
  <div class="tabbar-inner">
    <button class="tab active" id="tab-change" onclick="switchApp('change')">
      <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/><rect x="2" y="9" width="20" height="4" rx="1"/><path d="M5 13v5a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-5"/><line x1="9" y1="9" x2="9" y2="5"/><line x1="15" y1="9" x2="15" y2="5"/><rect x="8" y="16" width="8" height="2" rx="0.5"/></svg></span>
      <span class="tab-label" data-t="tabChange">تسوّق</span>
    </button>
    <button class="tab" id="tab-calc" onclick="switchApp('calc')">
      <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M2 9h2"/><path d="M20 9h2"/><path d="M2 15h2"/><path d="M20 15h2"/></svg></span>
      <span class="tab-label" data-t="tabCalc">تحويل</span>
    </button>
  </div>
</div>

<!-- Install banner (iOS) -->
<div class="install-banner" id="install-banner" style="display:none">
  <div class="ib-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
  <div class="ib-text" id="install-text"></div>
  <button class="ib-install" id="install-btn" style="display:none" onclick="doInstall()" data-t="installBtn">تثبيت</button>
  <button class="ib-close" onclick="dismissInstall()">&times;</button>
</div>

<script>
/* ── i18n ── */
var T = {
  ar: {
    titleChange: 'حاسبة الباقي',
    titleCalc: 'حاسبة العملات',
    owed: 'المبلغ المطلوب',
    paid: 'المبلغ المدفوع',
    'new': 'جديدة',
    old: 'قديمة',
    changeLabel: 'الباقي',
    changeBills: 'تفاصيل أوراق الباقي',
    calcAmount: 'المبلغ',
    calcBills: 'تفاصيل الأوراق النقدية',
    tabChange: 'تسوّق',
    tabCalc: 'تحويل',
    paidLess: 'المبلغ المدفوع أقل من المطلوب',
    noChange: 'لا يوجد باقٍ',
    tooSmall: 'المبلغ أقل من أصغر ورقة نقدية (50 قديمة)',
    remainder: ' قديمة باقٍ (لا توجد ورقة أصغر)',
    billsTotal: ' ورقة إجمالاً',
    plusRemainder: ' + باقٍ',
    installTextIos: 'لتثبيت التطبيق، اضغط <svg class="ib-share" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> ثم <strong>إضافة للشاشة الرئيسية</strong>',
    installTextAndroid: 'أضف التطبيق إلى شاشتك الرئيسية',
    installBtn: 'تثبيت'
  },
  en: {
    titleChange: 'Change Calculator',
    titleCalc: 'Currency Calculator',
    owed: 'Amount Owed',
    paid: 'Amount Paid',
    'new': 'New',
    old: 'Old',
    changeLabel: 'Change',
    changeBills: 'Change Breakdown',
    calcAmount: 'Amount',
    calcBills: 'Bill Breakdown',
    tabChange: 'Shopping',
    tabCalc: 'Convert',
    paidLess: 'Amount paid is less than owed',
    noChange: 'No change',
    tooSmall: 'Amount is less than smallest bill (50 Old)',
    remainder: ' Old remainder (no smaller bill)',
    billsTotal: ' bills total',
    plusRemainder: ' + remainder',
    installTextIos: 'To install, tap <svg class="ib-share" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> then <strong>Add to Home Screen</strong>',
    installTextAndroid: 'Add this app to your home screen',
    installBtn: 'Install'
  }
};

var lang = localStorage.getItem('lang') || 'ar';

function t(key){ return T[lang][key]; }

function applyLang(){
  var html = document.documentElement;
  html.lang = lang;
  html.dir = lang==='ar' ? 'rtl' : 'ltr';
  html.className = lang==='en' ? 'en' : '';

  gel('lang-ar').className = 'lang-btn' + (lang==='ar'?' active':'');
  gel('lang-en').className = 'lang-btn' + (lang==='en'?' active':'');

  // Update all data-t elements
  document.querySelectorAll('[data-t]').forEach(function(el){
    el.textContent = t(el.getAttribute('data-t'));
  });

  // Update page title
  gel('page-title').textContent = appMode==='calc' ? t('titleCalc') : t('titleChange');

  // Install banner
  if(installMode==='ios') gel('install-text').innerHTML = t('installTextIos');
  else if(installMode==='android') gel('install-text').innerHTML = t('installTextAndroid');
  gel('install-btn').textContent = t('installBtn');

  // Re-run dynamic text
  updateCalc();
  updateChange();
}

function setLang(l){
  lang = l;
  localStorage.setItem('lang', lang);
  applyLang();
}

/* ── Install banner logic ── */
var installMode = '';
var deferredPrompt = null;

(function(){
  var isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
  var dismissed = localStorage.getItem('install-dismissed');

  if(!isStandalone && !dismissed){
    if(isIos){
      installMode = 'ios';
      showInstallBanner();
    }
  }
})();

window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredPrompt = e;
  var dismissed = localStorage.getItem('install-dismissed');
  if(!dismissed){
    installMode = 'android';
    showInstallBanner();
  }
});

function showInstallBanner(){
  var banner = document.getElementById('install-banner');
  var btn = document.getElementById('install-btn');
  if(installMode==='ios'){
    gel('install-text').innerHTML = t('installTextIos');
    btn.style.display = 'none';
  } else {
    gel('install-text').innerHTML = t('installTextAndroid');
    btn.style.display = 'block';
    btn.textContent = t('installBtn');
  }
  banner.style.display = 'flex';
}

function doInstall(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(){ deferredPrompt = null; });
  }
  dismissInstall();
}

function dismissInstall(){
  document.getElementById('install-banner').style.display = 'none';
  localStorage.setItem('install-dismissed', '1');
}

/* ── Shared ── */
var BILLS = [
  {old:50000, label:'500', type:'new'},
  {old:20000, label:'200', type:'new'},
  {old:10000, label:'100', type:'new'},
  {old:5000,  label:'50',  type:'new'},
  {old:2500,  label:'25',  type:'new'},
  {old:2000,  label:'2,000', type:'old'},
  {old:1000,  label:'10',  type:'new'},
  {old:500,   label:'500', type:'old'},
  {old:200,   label:'200', type:'old'},
  {old:100,   label:'100', type:'old'},
  {old:50,    label:'50',  type:'old'}
];

function fmt(n){ return n.toLocaleString('en-US'); }
function gel(id){ return document.getElementById(id); }
function toOld(val, cur){ return cur==='new' ? val*100 : val; }

function renderBills(oldVal, billsEl, totalEl){
  var remaining = oldVal;
  var result = [];
  BILLS.forEach(function(bill){
    if(remaining >= bill.old){
      var count = Math.floor(remaining / bill.old);
      remaining -= count * bill.old;
      result.push({count:count, label:bill.label, type:bill.type});
    }
  });
  billsEl.innerHTML = '';
  var totalCount = 0;

  if(result.length === 0 && remaining > 0){
    billsEl.innerHTML = '<div class="bill-warning">'+t('tooSmall')+'</div>';
    totalEl.textContent = '';
    return;
  }

  result.forEach(function(r){
    totalCount += r.count;
    var isNew = r.type === 'new';
    var bg = isNew ? '#E6F7EE' : '#F0F2F5';
    var badgeColor = isNew ? '#00B856' : '#5A6B7F';
    var badgeBg = isNew ? '#00B85615' : '#E2E8F0';
    billsEl.innerHTML +=
      '<div class="bill-row" style="background:'+bg+'">'+
      '<div class="bill-badge" style="background:'+badgeBg+';color:'+badgeColor+'">'+(isNew?t('new'):t('old'))+'</div>'+
      '<div class="bill-info"><span class="denom">'+r.label+'</span><span class="unit">'+(isNew?t('new'):t('old'))+'</span></div>'+
      '<div class="bill-count">&times; '+r.count+'</div></div>';
  });

  if(remaining > 0){
    billsEl.innerHTML += '<div class="bill-warning">'+fmt(remaining)+t('remainder')+'</div>';
  }
  totalEl.textContent = totalCount + t('billsTotal') + (remaining > 0 ? t('plusRemainder') : '');
}

/* ── App Mode Switch ── */
var appMode = 'change';
function switchApp(m){
  appMode = m;
  gel('tab-calc').className = 'tab' + (m==='calc'?' active':'');
  gel('tab-change').className = 'tab' + (m==='change'?' active':'');
  gel('panel-calc').className = 'panel' + (m==='calc'?' active':'');
  gel('panel-change').className = 'panel' + (m==='change'?' active':'');
  gel('page-title').textContent = m==='calc' ? t('titleCalc') : t('titleChange');
}

/* ══════════════════════════
   CALC MODE
   ══════════════════════════ */
var calcCur = 'new';

function setCur(m){
  calcCur = m;
  gel('tog-new').className = 'toggle-btn' + (m==='new'?' active':'');
  gel('tog-old').className = 'toggle-btn' + (m==='old'?' active':'');
  gel('calc-input').value = '';
  updateCalc();
}

function updateCalc(){
  var raw = parseInt(gel('calc-input').value) || 0;

  var oldVal = calcCur==='new' ? raw*100 : raw;
  var newVal = calcCur==='new' ? raw : raw/100;

  var equivEl = gel('calc-equiv');
  if(calcCur==='new'){
    equivEl.textContent = raw ? '= '+fmt(oldVal)+' '+t('old') : '= 0 '+t('old');
  } else {
    equivEl.textContent = raw ? '= '+fmt(newVal)+' '+t('new') : '= 0 '+t('new');
  }

  var resultsEl = gel('calc-results');
  if(!raw){ resultsEl.style.display='none'; return; }
  resultsEl.style.display='block';
  renderBills(oldVal, gel('calc-bills'), gel('calc-total'));
}

/* ══════════════════════════
   CHANGE MODE
   ══════════════════════════ */
var owedCur = 'new';
var paidCur = 'new';

function setFieldCur(field, cur){
  if(field==='owed'){
    owedCur = cur;
    gel('owed-cur-new').className = 'field-cur-btn' + (cur==='new'?' active':'');
    gel('owed-cur-old').className = 'field-cur-btn' + (cur==='old'?' active':'');
  } else {
    paidCur = cur;
    gel('paid-cur-new').className = 'field-cur-btn' + (cur==='new'?' active':'');
    gel('paid-cur-old').className = 'field-cur-btn' + (cur==='old'?' active':'');
  }
  updateChange();
}

function updateChange(){
  var owedRaw = parseInt(gel('ch-owed-input').value) || 0;
  var paidRaw = parseInt(gel('ch-paid-input').value) || 0;

  var resultEl = gel('ch-result');
  var resultsEl = gel('ch-results');

  if(!owedRaw || !paidRaw){
    resultEl.style.display = 'none';
    resultsEl.style.display = 'none';
    return;
  }

  var owedOld = toOld(owedRaw, owedCur);
  var paidOld = toOld(paidRaw, paidCur);
  var changeOld = paidOld - owedOld;

  resultEl.style.display = 'block';
  var changeAmtEl = gel('ch-change-amt');
  var changeEquivEl = gel('ch-change-equiv');

  var changeNew = changeOld / 100;
  gel('ch-change-cur').textContent = t('new');

  if(changeOld < 0){
    changeAmtEl.textContent = fmt(Math.abs(changeNew)) + '−';
    changeAmtEl.className = 'change-amount negative';
    resultsEl.style.display = 'none';
    changeEquivEl.textContent = t('paidLess');
    return;
  }

  changeAmtEl.textContent = fmt(changeNew);
  changeAmtEl.className = 'change-amount';
  changeEquivEl.textContent = '= ' + fmt(changeOld) + ' ' + t('old');

  if(changeOld === 0){
    resultsEl.style.display = 'none';
    changeEquivEl.textContent = t('noChange');
    return;
  }

  resultsEl.style.display = 'block';
  renderBills(changeOld, gel('ch-bills'), gel('ch-total'));
}

/* ── Init ── */
applyLang();

/* ── PWA ── */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
